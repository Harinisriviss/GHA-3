name: Artifact demo
on:
    push:
        branches: 
            - main
            - dev
            - release*
    #     paths:
    #         - 'src/**'
    # pull_request:
    #     branches:
    #         - main
    #         - dev
    #         - release*
    # workflow_dispatch:
    #     schedule:
    #         - cron: '0 9 * * *' # every day at 9:00 UTC
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v3
            - name: install deps
              run: npm ci
            - name: check code linting
              run: npm run lint
            - name: Run tests
              run: npm run test

    build:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v3
            - name: install deps
              run: npm ci
            - name: Build
              run: npm run build
            - name: upload artifact
              uses: actions/upload-artifact@v3
              with:
                  name: dist-files
                  path: dist
                              